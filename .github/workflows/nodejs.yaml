name: Node.js CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node: ['22.x', '24.x']
        name: Node ${{ matrix.node }}
        steps:
            - uses: actions/checkout@v6
            - name: Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node }}
            - run: npm ci
            - run: npm run test:coverage
